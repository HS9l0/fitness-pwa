name: Bump SW cache version

on:
  push:
    branches: [main]

jobs:
  bump:
    # Skip the commit this workflow itself produces
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp SW cache with commit SHA
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          sed -i "s/const CACHE = 'fitplan-[^']*'/const CACHE = 'fitplan-$SHORT'/" sw.js

      - name: Commit and push
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT:0:7}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --staged --quiet && echo "sw.js unchanged" && exit 0
          git commit -m "chore: bump SW cache to fitplan-$SHORT [skip ci]"
          git push
