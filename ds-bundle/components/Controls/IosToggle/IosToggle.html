<!-- @dsCard group="Controls" name="IosToggle" viewport='{"width":400}' -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>html,body{margin:0;padding:0;background:var(--bg);} .preview{padding:20px;display:flex;flex-direction:column;gap:16px;}</style>
</head>
<body>
  <div class="preview">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:0.88rem;color:var(--text)">Rest Timer</span>
      <label class="ios-toggle"><input type="checkbox" checked/><span class="ios-track"></span></label>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:0.88rem;color:var(--text)">Sound Effects</span>
      <label class="ios-toggle"><input type="checkbox"/><span class="ios-track"></span></label>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:0.88rem;color:var(--text)">Haptic Feedback</span>
      <label class="ios-toggle"><input type="checkbox" checked/><span class="ios-track"></span></label>
    </div>
  </div>
</body>
</html>
