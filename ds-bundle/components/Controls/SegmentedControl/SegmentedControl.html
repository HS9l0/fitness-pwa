<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>html,body{margin:0;padding:0;background:var(--bg);} .preview{padding:20px;display:flex;flex-direction:column;gap:16px;}</style>
</head>
<body>
  <div class="preview">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:0.88rem;color:var(--text)">Weight Unit</span>
      <div class="unit-seg">
        <button class="unit-seg-btn active">kg</button>
        <button class="unit-seg-btn">lbs</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:0.88rem;color:var(--text)">Theme</span>
      <div class="unit-seg">
        <button class="unit-seg-btn">Light</button>
        <button class="unit-seg-btn active">Dark</button>
      </div>
    </div>
  </div>
</body>
</html>
