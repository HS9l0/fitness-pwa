<!-- @dsCard group="Workout" name="SetRow" viewport='{"width":400}' -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>html,body{margin:0;padding:0;background:var(--bg);} .preview{padding:16px;}</style>
</head>
<body>
  <div class="preview">
    <div class="sets-list">
      <!-- Default set -->
      <div class="set-row">
        <div class="set-row-top">
          <div class="set-num">1</div>
          <div class="set-fields">
            <div class="set-field">
              <div class="set-val">80</div>
              <div class="set-field-lbl">kg</div>
            </div>
            <div class="set-sep">×</div>
            <div class="set-field">
              <div class="set-val">10</div>
              <div class="set-field-lbl">reps</div>
            </div>
          </div>
        </div>
        <div class="set-row-foot">
          <button class="set-skip-btn">Skip</button>
          <button class="set-check-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
      <!-- Done set -->
      <div class="set-row done">
        <div class="set-row-top">
          <div class="set-num">2</div>
          <div class="set-fields">
            <div class="set-field">
              <div class="set-val">80</div>
              <div class="set-field-lbl">kg</div>
            </div>
            <div class="set-sep">×</div>
            <div class="set-field">
              <div class="set-val">10</div>
              <div class="set-field-lbl">reps</div>
            </div>
          </div>
        </div>
        <div class="set-row-foot">
          <button class="set-skip-btn">Skip</button>
          <button class="set-check-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
      <!-- Skipped set -->
      <div class="set-row skipped">
        <div class="set-row-top">
          <div class="set-num">3</div>
          <div class="set-fields">
            <div class="set-field">
              <div class="set-val">—</div>
              <div class="set-field-lbl">kg</div>
            </div>
            <div class="set-sep">×</div>
            <div class="set-field">
              <div class="set-val">—</div>
              <div class="set-field-lbl">reps</div>
            </div>
          </div>
        </div>
        <div class="set-row-foot">
          <button class="set-skip-btn">Skip</button>
          <button class="set-check-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
