<!-- @dsCard group="Workout" name="ExerciseCard" viewport='{"width":400}' -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>html,body{margin:0;padding:0;background:var(--bg);} .preview{padding:16px;display:flex;flex-direction:column;gap:0;}</style>
</head>
<body>
  <div class="preview">
    <!-- Open card -->
    <div class="exercise-card open">
      <div class="ex-header">
        <div class="ex-num">1</div>
        <div class="ex-info">
          <div class="ex-name">Bench Press</div>
          <div class="ex-muscles">Chest, Triceps, Shoulders</div>
        </div>
        <div class="ex-meta">4 × 10</div>
        <svg class="ex-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div class="ex-body-outer" style="grid-template-rows:1fr;opacity:1">
        <div class="ex-body" style="padding:0 16px 16px;border-top-color:var(--border)">
          <div class="sets-list" style="margin-top:12px">
            <div class="set-row done">
              <div class="set-row-top">
                <div class="set-num">1</div>
                <div class="set-fields">
                  <div class="set-field"><div class="set-val">80</div><div class="set-field-lbl">kg</div></div>
                  <div class="set-sep">×</div>
                  <div class="set-field"><div class="set-val">10</div><div class="set-field-lbl">reps</div></div>
                </div>
              </div>
            </div>
            <div class="set-row">
              <div class="set-row-top">
                <div class="set-num">2</div>
                <div class="set-fields">
                  <div class="set-field"><div class="set-val">80</div><div class="set-field-lbl">kg</div></div>
                  <div class="set-sep">×</div>
                  <div class="set-field"><div class="set-val empty">reps</div><div class="set-field-lbl">reps</div></div>
                </div>
              </div>
              <div class="set-row-foot">
                <button class="set-skip-btn">Skip</button>
                <button class="set-check-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Closed card -->
    <div class="exercise-card">
      <div class="ex-header">
        <div class="ex-num">2</div>
        <div class="ex-info">
          <div class="ex-name">Incline Dumbbell Press</div>
          <div class="ex-muscles">Upper Chest, Shoulders</div>
        </div>
        <div class="ex-meta">3 × 12</div>
        <svg class="ex-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
    <!-- Complete card -->
    <div class="exercise-card ex-complete">
      <div class="ex-header" style="border-left:3px solid var(--accent-2)">
        <div class="ex-num">3</div>
        <div class="ex-info">
          <div class="ex-name">Cable Flyes</div>
          <div class="ex-muscles">Chest</div>
        </div>
        <div class="ex-meta">3 × 15</div>
        <svg class="ex-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
