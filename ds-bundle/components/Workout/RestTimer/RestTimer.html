<!-- @dsCard group="Workout" name="RestTimer" viewport='{"width":400,"height":260}' -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>
    html,body{margin:0;padding:0;background:var(--bg);}
    .preview{height:260px;display:flex;align-items:center;justify-content:center;position:relative;}
  </style>
</head>
<body>
  <div class="preview">
    <div class="rest-card" style="position:relative">
      <div class="rest-lbl">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        REST
      </div>
      <div class="rest-arc-wrap">
        <svg class="rest-arc-svg" viewBox="0 0 80 80">
          <circle class="rest-arc-bg" cx="40" cy="40" r="35"/>
          <circle class="rest-arc-fill" cx="40" cy="40" r="35"
            stroke-dasharray="219.9"
            stroke-dashoffset="73.3"
            transform="rotate(-90 40 40)"/>
        </svg>
        <div class="rest-arc-inner">
          <span class="rest-count">47</span>
        </div>
      </div>
      <div class="rest-btns">
        <button class="rest-btn-add">+30s</button>
        <button class="rest-btn-skip">Skip</button>
      </div>
    </div>
  </div>
</body>
</html>
