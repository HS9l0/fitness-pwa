<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../../styles.css" />
  <style>html,body{margin:0;padding:0;background:var(--bg);} .preview{padding:20px;display:flex;flex-direction:column;gap:16px;}</style>
</head>
<body>
  <div class="preview">
    <div class="sets-progress">
      <div class="sets-progress-bar"><div class="sets-progress-fill" style="width:50%"></div></div>
      <div class="sets-progress-txt">2 / 4 sets</div>
    </div>
    <div class="sets-progress">
      <div class="sets-progress-bar"><div class="sets-progress-fill" style="width:100%"></div></div>
      <div class="sets-progress-txt">4 / 4 sets</div>
    </div>
    <div class="sets-progress">
      <div class="sets-progress-bar"><div class="sets-progress-fill" style="width:25%"></div></div>
      <div class="sets-progress-txt">1 / 4 sets</div>
    </div>
  </div>
</body>
</html>
