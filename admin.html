<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitPlan Staff</title>
  <style>
    :root {
      --bg:             #0f0e0d;
      --surface:        #1c1917;
      --surface-raised: #252219;
      --border:         #353029;
      --accent:         #f97316;
      --accent-2:       #22c55e;
      --text:           #ede9e3;
      --text-muted:     #9a8d83;
      --text-dim:       #534a43;
      --radius:         10px;
      --radius-sm:      6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, 'Segoe UI', sans-serif; min-height: 100vh; font-size: 0.9rem; }
    a { color: var(--accent); }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    code { font-family: monospace; }

    /* ── Auth loading ── */
    #auth-loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid var(--border); border-top-color: var(--accent);
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Admin layout ── */
    #admin-screen { display: none; flex-direction: column; min-height: 100vh; }

    .admin-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 5;
    }
    .admin-logo { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 0.92rem; color: #fff; }
    .staff-badge {
      background: rgba(249,115,22,0.15); color: var(--accent);
      border: 1px solid rgba(249,115,22,0.3);
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 2px 8px; border-radius: 20px;
    }
    .admin-header-right { display: flex; align-items: center; gap: 12px; font-size: 0.78rem; color: var(--text-muted); }
    #signout-btn {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      font-size: 0.72rem; color: var(--text-dim);
      transition: border-color 0.15s, color 0.15s;
    }
    #signout-btn:hover { border-color: var(--accent); color: var(--accent); }

    .admin-body { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

    #loading { display: none; padding: 48px; text-align: center; color: var(--text-muted); }
    #loading::before {
      content: ''; display: block; width: 28px; height: 28px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px;
    }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }

    /* ── Rules error ── */
    .rules-card { text-align: center; }
    .rules-icon { font-size: 2rem; margin-bottom: 12px; }
    .rules-card h3 { font-size: 1rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .steps { text-align: left; padding-left: 20px; margin: 14px 0; color: var(--text-muted); font-size: 0.82rem; line-height: 2; }
    .rules-wrap { position: relative; text-align: left; margin: 14px 0; }
    .rules-pre { background: #0a0907; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-size: 0.7rem; color: #a0b0c0; line-height: 1.7; overflow-x: auto; white-space: pre; }
    .copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 12px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.7rem; color: var(--text-muted); transition: background 0.15s, color 0.15s; }
    .copy-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .retry-btn { display: inline-block; margin-top: 8px; padding: 9px 26px; background: var(--accent); color: #fff; font-weight: 700; border-radius: var(--radius-sm); font-size: 0.86rem; transition: opacity 0.15s; }
    .retry-btn:hover { opacity: 0.88; }

    /* ── Stats row ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 18px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; text-align: center; }
    .stat-num { font-size: 1.9rem; font-weight: 800; color: #fff; line-height: 1; }
    .stat-lbl { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

    /* ── User table ── */
    .user-table { width: 100%; border-collapse: collapse; }
    .user-table th { text-align: left; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); padding: 0 10px 10px; border-bottom: 1px solid var(--border); }
    .user-table td { padding: 12px 10px; border-bottom: 1px solid rgba(53,48,41,0.6); }
    .user-table tr:last-child td { border-bottom: none; }
    .user-table tr:hover td { background: rgba(255,255,255,0.018); }
    .tc { text-align: center; }

    .user-cell  { display: flex; align-items: center; gap: 10px; }
    .avatar     { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
    .avatar-ph  { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--surface-raised); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; color: var(--accent); }
    .user-name  { font-size: 0.86rem; font-weight: 600; color: #fff; }
    .user-email { font-size: 0.7rem; color: var(--text-muted); margin-top: 1px; }

    .view-btn { padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.75rem; color: var(--text-muted); transition: border-color 0.15s, color 0.15s, background 0.15s; }
    .view-btn:hover { color: var(--accent); border-color: rgba(249,115,22,0.4); background: rgba(249,115,22,0.06); }

    /* ── Status badge ── */
    .status-badge { display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; border: 1px solid; text-transform: uppercase; letter-spacing: 0.8px; }

    /* ── User detail ── */
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 18px; padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); transition: color 0.15s, border-color 0.15s; }
    .back-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .profile-card  { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
    .avatar-lg     { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; }
    .avatar-lg-ph  { width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0; background: var(--surface-raised); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .profile-info  { flex: 1; min-width: 0; }
    .profile-name-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 3px; }
    .profile-name  { font-size: 1.15rem; font-weight: 800; color: #fff; }
    .uid-text      { display: block; font-size: 0.62rem; color: var(--text-dim); margin-top: 4px; font-family: monospace; }
    .profile-actions { display: flex; gap: 8px; flex-shrink: 0; }

    /* ── Action buttons ── */
    .action-btn { padding: 7px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 0.78rem; font-weight: 600; color: var(--text); background: var(--surface-raised); transition: background 0.15s, border-color 0.15s, transform 0.1s; white-space: nowrap; }
    .action-btn:hover  { background: var(--border); }
    .action-btn:active { transform: scale(0.97); }
    .action-danger     { color: #e06040; border-color: rgba(224,96,64,0.3); background: rgba(224,96,64,0.06); }
    .action-danger:hover { background: rgba(224,96,64,0.14); border-color: rgba(224,96,64,0.5); }

    /* ── Controls ── */
    .ctrl-row       { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
    .ctrl-group     { display: flex; flex-direction: column; gap: 5px; }
    .ctrl-group-grow{ flex: 1; min-width: 160px; }
    .ctrl-label     { font-size: 0.6rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .ctrl-select, .ctrl-input { background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 7px 10px; font: inherit; font-size: 0.84rem; transition: border-color 0.15s; }
    .ctrl-select { cursor: pointer; }
    .ctrl-select:focus, .ctrl-input:focus { outline: none; border-color: var(--accent); }

    /* ── List controls ── */
    .list-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 8px 12px; font: inherit; font-size: 0.84rem; transition: border-color 0.15s; }
    .search-input::placeholder { color: var(--text-dim); }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .refresh-btn { padding: 8px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 0.8rem; color: var(--text-muted); transition: color 0.15s, border-color 0.15s; }
    .refresh-btn:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── Section title ── */
    .sec-title { font-size: 0.62rem; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-dim); margin: 22px 0 10px; }

    /* ── Session cards ── */
    .session-card { margin-bottom: 10px; }
    .sess-header  { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
    .sess-title   { display: flex; align-items: center; gap: 10px; }
    .sess-name    { font-weight: 700; font-size: 0.92rem; }
    .sess-meta    { display: flex; align-items: center; gap: 10px; }
    .day-badge    { background: var(--accent); color: #fff; font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .ex-row       { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-top: 1px solid rgba(53,48,41,0.6); flex-wrap: wrap; }
    .ex-name      { font-size: 0.8rem; font-weight: 600; color: var(--text); min-width: 150px; }
    .ex-sets      { flex: 1; }
    .set-pill     { display: inline-block; background: var(--surface-raised); border-radius: 4px; padding: 2px 7px; font-size: 0.7rem; color: var(--text-muted); margin: 2px 3px 2px 0; }

    /* ── Icon delete button ── */
    .icon-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border: 1px solid transparent; transition: background 0.15s, border-color 0.15s, transform 0.1s; }
    .icon-btn:hover  { background: rgba(224,96,64,0.1); border-color: rgba(224,96,64,0.3); }
    .icon-btn:active { transform: scale(0.9); }

    /* ── Water table ── */
    .water-table { width: 100%; border-collapse: collapse; }
    .water-table th { text-align: left; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); padding: 0 10px 10px; border-bottom: 1px solid var(--border); }
    .water-table td { padding: 9px 10px; border-bottom: 1px solid rgba(53,48,41,0.5); }
    .water-table tr:last-child td { border-bottom: none; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; }
    .progress-bar  { flex: 1; height: 5px; background: var(--surface-raised); border-radius: 3px; overflow: hidden; min-width: 50px; }
    .progress-fill { height: 100%; border-radius: 3px; }
    .progress-pct  { width: 32px; font-size: 0.68rem; text-align: right; }

    /* ── Modal ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 24px 18px; max-width: 340px; width: 90%; animation: modal-in 0.18s cubic-bezier(0.16,1,0.3,1); }
    @keyframes modal-in { from { transform: scale(0.94) translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
    .modal-msg  { color: var(--text); line-height: 1.55; margin-bottom: 18px; font-size: 0.88rem; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-cancel { padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-muted); font-size: 0.82rem; transition: border-color 0.15s, color 0.15s; }
    .modal-cancel:hover { border-color: var(--text-muted); color: var(--text); }
    .modal-ok     { padding: 7px 16px; border-radius: var(--radius-sm); background: var(--surface-raised); border: 1px solid var(--border); color: var(--text); font-size: 0.82rem; font-weight: 600; transition: background 0.15s; }
    .modal-danger { background: #c0432a; border-color: #c0432a; color: #fff; }
    .modal-danger:hover { opacity: 0.88; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 18px; font-size: 0.8rem; font-weight: 600; opacity: 0; transition: opacity 0.22s, transform 0.22s; z-index: 200; white-space: nowrap; pointer-events: none; }
    .toast.toast-show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.toast-success { border-color: rgba(34,197,94,0.4); color: #22c55e; }
    .toast.toast-error   { border-color: rgba(224,96,64,0.4); color: #e06040; }

    .muted { color: var(--text-muted); font-size: 0.76rem; }
    .empty { color: var(--text-dim); font-size: 0.84rem; padding: 20px 0; text-align: center; }

    /* ── Settings panel ── */
    .settings-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .unit-toggle   { display: flex; gap: 16px; padding: 8px 12px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .unit-opt      { display: flex; align-items: center; gap: 6px; font-size: 0.84rem; color: var(--text); cursor: pointer; }
    .unit-opt input{ accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }

    /* ── Admin access panel ── */
    .admin-emails-list  { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .admin-email-row    { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; background: var(--surface-raised); border: 1px solid var(--border); border-radius: var(--radius-sm); }
    .admin-email-info   { display: flex; align-items: center; gap: 8px; }
    .admin-email-addr   { font-size: 0.84rem; color: var(--text); font-family: monospace; }
    .admin-you-badge    { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 6px; border-radius: 10px; background: rgba(249,115,22,0.15); color: var(--accent); border: 1px solid rgba(249,115,22,0.3); }
    .add-admin-row      { display: flex; gap: 8px; align-items: center; }

    @media (max-width: 600px) {
      .admin-body { padding: 14px; }
      .profile-card { flex-direction: column; align-items: flex-start; }
      .profile-actions { flex-direction: row; }
      .user-table th:nth-child(4), .user-table td:nth-child(4),
      .user-table th:nth-child(5), .user-table td:nth-child(5) { display: none; }
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Auth checking -->
  <div id="auth-loading"><div class="spinner"></div></div>

  <!-- Admin panel -->
  <div id="admin-screen">
    <header class="admin-header">
      <div class="admin-logo">
        💪 FitPlan <span class="staff-badge">Staff</span>
      </div>
      <div class="admin-header-right">
        <span id="admin-user"></span>
        <button id="signout-btn">Sign out</button>
      </div>
    </header>

    <div class="admin-body">
      <div id="loading">Loading…</div>
      <div id="main-content"></div>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
