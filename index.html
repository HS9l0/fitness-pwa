<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fitness Plan</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f0e0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitPlan" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Sign-in gate -->
  <div id="signin-screen">
    <div class="signin-wrap">
      <div class="signin-logo">💪</div>
      <h1>FitPlan</h1>
      <p>Track your workouts and stay consistent.</p>
      <button id="google-signin-btn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <label class="remember-label">
        <input type="checkbox" id="remember-me" checked />
        Remember me on this device
      </label>
      <div class="signin-footer">
        <p class="signin-note">Your data is private — only you can see it</p>
        <button id="staff-login-btn" class="staff-link">Staff login →</button>
      </div>
    </div>
  </div>

  <!-- Main app -->
  <div id="app" style="display:none">

    <!-- Desktop sidebar -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <span style="font-size:1.4rem">💪</span>
        <span>FitPlan</span>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-btn active" data-screen="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Home
        </button>
        <button class="sidebar-btn" data-screen="workout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/>
          </svg>
          Workout
        </button>
        <button class="sidebar-btn" data-screen="plan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Plan
        </button>
        <button class="sidebar-btn" data-screen="nutrition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
          </svg>
          Nutrition
        </button>
        <button class="sidebar-btn" data-screen="progress">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Progress
        </button>
      </nav>
      <div id="sidebar-user" class="sidebar-user"></div>
    </aside>

    <!-- Screens -->
    <main id="screens">
      <section id="screen-home" class="screen active"></section>
      <section id="screen-workout" class="screen"></section>
      <section id="screen-plan" class="screen"></section>
      <section id="screen-nutrition" class="screen"></section>
      <section id="screen-progress"  class="screen"></section>
    </main>

    <!-- Mobile bottom nav -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-screen="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-screen="workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/>
        </svg>
        <span>Workout</span>
      </button>
      <button class="nav-btn" data-screen="plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Plan</span>
      </button>
      <button class="nav-btn" data-screen="nutrition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
        </svg>
        <span>Nutrition</span>
      </button>
      <button class="nav-btn" data-screen="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Progress</span>
      </button>
    </nav>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
