<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Fitness Plan</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitPlan" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div id="app">

    <!-- Screens -->
    <main id="screens">
      <section id="screen-home" class="screen active"></section>
      <section id="screen-workout" class="screen"></section>
      <section id="screen-history" class="screen"></section>
      <section id="screen-plan" class="screen"></section>
    </main>

    <!-- Bottom Nav -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-screen="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-screen="workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/>
        </svg>
        <span>Workout</span>
      </button>
      <button class="nav-btn" data-screen="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>History</span>
      </button>
      <button class="nav-btn" data-screen="plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>Plan</span>
      </button>
    </nav>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
