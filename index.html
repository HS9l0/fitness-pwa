<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Fitness Plan</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c1520" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FitPlan" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <script>if(navigator.standalone||matchMedia('(display-mode:standalone)').matches)document.documentElement.className+=' pwa';</script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Main app -->
  <div id="app">

    <!-- Desktop sidebar -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <span style="font-size:1.4rem">💪</span>
        <span>FitPlan</span>
      </div>
      <nav class="sidebar-nav">
        <button class="sidebar-btn active" data-screen="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Home
        </button>
        <button class="sidebar-btn" data-screen="workout">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/>
          </svg>
          Workout
        </button>
        <button class="sidebar-btn" data-screen="plan">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          Plan
        </button>
        <button class="sidebar-btn" data-screen="nutrition">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
            <path d="M7 2v20"/>
            <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
          </svg>
          Nutrition
        </button>
        <button class="sidebar-btn" data-screen="progress">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          Progress
        </button>
      </nav>
    </aside>

    <!-- Screens -->
    <main id="screens">
      <section id="screen-home" class="screen active"></section>
      <section id="screen-workout" class="screen"></section>
      <section id="screen-plan" class="screen"></section>
      <section id="screen-nutrition" class="screen"></section>
      <section id="screen-progress"  class="screen"></section>
    </main>

    <!-- Mobile bottom nav -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-screen="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-screen="workout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 5v14M18 5v14M2 9h4M18 9h4M2 15h4M18 15h4"/>
        </svg>
        <span>Workout</span>
      </button>
      <button class="nav-btn" data-screen="plan">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span>Plan</span>
      </button>
      <button class="nav-btn" data-screen="nutrition">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/>
        </svg>
        <span>Nutrition</span>
      </button>
      <button class="nav-btn" data-screen="progress">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Progress</span>
      </button>
    </nav>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
